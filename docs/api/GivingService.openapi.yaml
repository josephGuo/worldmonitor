components:
    securitySchemes:
        WorldMonitorKey:
            type: apiKey
            in: header
            name: X-WorldMonitor-Key
            description: User-issued WorldMonitor API key.
        ApiKeyHeader:
            type: apiKey
            in: header
            name: X-Api-Key
            description: Alias header for the WorldMonitor API key (X-WorldMonitor-Key).
    schemas:
        JmespathProjectionError:
            description: Returned when a REST jmespath projection is invalid or exceeds the expression/output byte limits.
            properties:
                _jmespath_error:
                    description: Projection error discriminator and details.
                    type: string
                original_keys:
                    description: Top-level keys or shape of the unprojected response.
                    items:
                        type: string
                    type: array
            required:
                - _jmespath_error
                - original_keys
            type: object
        UnauthorizedError:
            type: object
            properties:
                error:
                    type: string
                    description: Human-readable error message.
            required:
                - error
            description: Returned when the API key is missing, malformed, or lacks current API access.
        Error:
            type: object
            properties:
                message:
                    type: string
                    description: Error message (e.g., 'user not found', 'database connection failed')
            description: Error is returned when a handler encounters an error. It contains a simple error message that the developer can customize.
        InvalidRequestBodyError:
            type: object
            description: Returned when a JSON POST request body is empty or malformed.
            properties:
                message:
                    type: string
                    description: Invalid request body
            required:
                - message
        GatewayError:
            type: object
            description: Returned by gateway infrastructure errors before an RPC handler runs, such as origin, routing, method, authentication, or quota checks.
            properties:
                error:
                    oneOf:
                        - type: string
                        - type: object
                          additionalProperties: true
                    description: Gateway error reason or structured gateway failure details.
            required:
                - error
        RateLimitError:
            type: object
            description: Returned when a gateway or handler rate limit rejects the request.
            properties:
                error:
                    type: string
                    description: Human-readable rate-limit failure reason.
            required:
                - error
        ForbiddenError:
            type: object
            properties:
                error:
                    type: string
                    description: Human-readable entitlement failure reason.
                requiredTier:
                    type: integer
                    format: int32
                    description: Minimum entitlement tier required for this endpoint.
                currentTier:
                    type: integer
                    format: int32
                    description: Caller entitlement tier when known.
                planKey:
                    type: string
                    description: Caller plan key when known.
            required:
                - error
            description: Returned when a PRO-gated endpoint denies access because the caller has no resolved authenticated user, entitlements cannot be verified, or the caller lacks the required entitlement tier.
        FieldViolation:
            type: object
            properties:
                field:
                    type: string
                    description: The field path that failed validation (e.g., 'user.email' for nested fields). For header validation, this will be the header name (e.g., 'X-API-Key')
                description:
                    type: string
                    description: Human-readable description of the validation violation (e.g., 'must be a valid email address', 'required field missing')
            required:
                - field
                - description
            description: FieldViolation describes a single validation error for a specific field.
        ValidationError:
            type: object
            properties:
                violations:
                    type: array
                    items:
                        $ref: '#/components/schemas/FieldViolation'
                    description: List of validation violations
            required:
                - violations
            description: ValidationError is returned when request validation fails. It contains a list of field violations describing what went wrong.
        GetGivingSummaryRequest:
            type: object
            properties:
                platformLimit:
                    type: integer
                    format: int32
                    description: |-
                        Number of platform rows to return (0 = all). Aggregates and provenance
                         continue to describe the full snapshot.
                categoryLimit:
                    type: integer
                    format: int32
                    description: |-
                        Number of category rows to return (0 = all). Aggregates and provenance
                         continue to describe the full snapshot.
            description: GetGivingSummaryRequest specifies projections over the published-claim snapshot.
        GetGivingSummaryResponse:
            type: object
            properties:
                summary:
                    $ref: '#/components/schemas/GivingSummary'
                fetchedAt:
                    type: integer
                    format: int64
                    description: |-
                        Cache/response materialization time as Unix epoch milliseconds. This is not
                         source publication or observation time. A value of 0 means the snapshot is
                         unavailable/degraded, not that giving activity is zero.. Warning: Values > 2^53 may lose precision in JavaScript
                dataAvailable:
                    type: boolean
                    description: |-
                        True when a summary payload is populated. False means an absent/empty
                         summary is graceful degradation because the snapshot is unavailable;
                         provenance and data mode are not required on that degraded shape.
            description: GetGivingSummaryResponse contains a cacheable published-claim snapshot.
        GivingSummary:
            type: object
            properties:
                generatedAt:
                    type: string
                    description: |-
                        Response summary generation time (ISO 8601). This is a transport/cache
                         timestamp, not a source publication or observation time.
                activityIndex:
                    type: number
                    format: double
                    description: |-
                        Legacy numeric compatibility sentinel. Corrected snapshots emit 0 and
                         activity_index_available=false; this is not a measured score.
                trend:
                    type: string
                    description: |-
                        Legacy string compatibility sentinel. Corrected snapshots retain "stable"
                         with trend_available=false; this is not a measured directional trend.
                estimatedDailyFlowUsd:
                    type: number
                    format: double
                    description: |-
                        Daily USD equivalent of only aggregate-eligible, verified annual or
                         defensibly annualized tracked-platform claims. It is not a live daily
                         observation or an estimate of all global giving.
                platforms:
                    type: array
                    items:
                        $ref: '#/components/schemas/PlatformGiving'
                categories:
                    type: array
                    items:
                        $ref: '#/components/schemas/CategoryBreakdown'
                crypto:
                    $ref: '#/components/schemas/CryptoGivingSummary'
                institutional:
                    $ref: '#/components/schemas/InstitutionalGiving'
                dataMode:
                    type: string
                    description: |-
                        Evidence mode: "published_estimate" or "partial_estimate". If absent in an
                         older payload, consumers must treat the payload as legacy/unknown, never as
                         a published estimate by proto scalar default.
                trendAvailable:
                    type: boolean
                    description: |-
                        True only when trend contains a measured directional trend. Corrected
                         published-claim snapshots emit false.
                provenance:
                    type: array
                    items:
                        $ref: '#/components/schemas/GivingProvenance'
                activityIndexAvailable:
                    type: boolean
                    description: |-
                        True only when activity_index contains a measured score. Corrected
                         published-claim snapshots emit false.
            description: |-
                GivingSummary is a cacheable snapshot of published giving claims. Source
                 reference periods live in provenance; generated_at is only the time this
                 response snapshot was materialized.
        PlatformGiving:
            type: object
            properties:
                platform:
                    type: string
                    minLength: 1
                    description: Platform name (e.g., "GoFundMe", "GlobalGiving", "JustGiving").
                dailyVolumeUsd:
                    type: number
                    format: double
                    description: |-
                        Daily USD equivalent derived from an aggregate-eligible published claim.
                         Zero means no eligible conversion, not measured zero giving.
                activeCampaignsSampled:
                    type: integer
                    format: int32
                    description: |-
                        Legacy live-sampling field. Zero is a not-collected compatibility sentinel
                         unless provenance says otherwise.
                newCampaigns24h:
                    type: integer
                    format: int32
                    description: |-
                        Legacy 24-hour field. Zero is a not-collected compatibility sentinel unless
                         provenance says otherwise.
                donationVelocity:
                    type: number
                    format: double
                    description: |-
                        Legacy live-velocity field. Zero is a not-collected compatibility sentinel
                         unless provenance says otherwise.
                dataFreshness:
                    type: string
                    description: |-
                        Legacy source basis/cadence ("annual", "cumulative", or "unknown"), not
                         response freshness or source age.
                lastUpdated:
                    type: string
                    description: |-
                        Verified source publication date only. Empty when no publication date was
                         verified; request/cache time must never be substituted.
            required:
                - platform
            description: PlatformGiving represents aggregated giving data from a single crowdfunding platform.
        CategoryBreakdown:
            type: object
            properties:
                category:
                    type: string
                    description: Category name (e.g., "Medical", "Disaster Relief", "Education").
                share:
                    type: number
                    format: double
                    description: |-
                        Published share (0-1) when verified. Zero is an unavailable sentinel when
                         the category evidence is unverified.
                change24h:
                    type: number
                    format: double
                    description: Legacy 24-hour change. Zero is a not-collected compatibility sentinel.
                activeCampaigns:
                    type: integer
                    format: int32
                    description: Legacy live campaign count. Zero is a not-collected compatibility sentinel.
                trending:
                    type: boolean
                    description: Legacy live trending indicator. Corrected static snapshots emit false.
            description: CategoryBreakdown retains the legacy wire shape for category claims.
        CryptoGivingSummary:
            type: object
            properties:
                dailyInflowUsd:
                    type: number
                    format: double
                    description: Daily USD equivalent from a verified annual claim, if available.
                trackedWallets:
                    type: integer
                    format: int32
                    description: Verified tracked-wallet count, if available.
                transactions24h:
                    type: integer
                    format: int32
                    description: Measured transactions in the last 24 hours, if a collector exists.
                topReceivers:
                    type: array
                    items:
                        type: string
                        description: Verified receiving platforms or organizations, if available.
                pctOfTotal:
                    type: number
                    format: double
                    description: Verified on-chain share of the relevant giving denominator, if available.
            description: |-
                CryptoGivingSummary retains the legacy wire shape. Corrected snapshots expose
                 only verified values; zero/empty fields are unavailable compatibility
                 sentinels, not measured on-chain activity.
        InstitutionalGiving:
            type: object
            properties:
                oecdOdaAnnualUsdBn:
                    type: number
                    format: double
                    description: Latest OECD ODA total (annual, USD billions).
                oecdDataYear:
                    type: integer
                    format: int32
                    description: Year of latest OECD data.
                cafWorldGivingIndex:
                    type: number
                    format: double
                    description: CAF World Giving Index score (latest).
                cafDataYear:
                    type: integer
                    format: int32
                    description: Year of latest CAF data.
                candidGrantsTracked:
                    type: integer
                    format: int32
                    description: Number of foundation grants tracked (Candid).
                dataLag:
                    type: string
                    description: Data lag description (e.g., "Quarterly", "Annual").
            description: InstitutionalGiving tracks large-scale structured philanthropy and ODA.
        GivingProvenance:
            type: object
            properties:
                subject:
                    type: string
                    description: Human-readable subject of the claim or collection-status record.
                sourceName:
                    type: string
                    description: Publisher or authority responsible for the referenced claim.
                sourceUrl:
                    type: string
                    description: HTTPS URL for the source or stable audit record.
                referencePeriod:
                    type: string
                    description: Period covered by the source claim (for example, "2024" or "25 years cumulative").
                sourcePublishedAt:
                    type: string
                    description: |-
                        Verified source publication date when known. Empty means not verified; it
                         must never fall back to generated_at, fetched_at, or access time.
                measurementBasis:
                    type: string
                    description: |-
                        What the reported number measures (annual, weekly average, cumulative,
                         institutional context, compatibility sentinel, or collection status).
                status:
                    type: string
                    description: |-
                        Verification status. Allowed values: "verified", "partially_verified",
                         "unverified", "not_collected", "not_applicable". Consumers must treat
                         unknown future values as "unverified".
                coveredMetricPaths:
                    type: array
                    items:
                        type: string
                        description: |-
                            Stable proto response field paths covered by this evidence record. Field
                             names use the proto snake_case spelling (for example,
                             "summary.estimated_daily_flow_usd").
                includedInHighlightedAggregate:
                    type: boolean
                    description: Whether this claim contributes to the highlighted tracked-platform aggregate.
                reportedValue:
                    type: number
                    format: double
                    description: Numeric value exactly as reported or recorded for the compatibility status.
                reportedUnit:
                    type: string
                    description: Unit attached to reported_value without implicit currency conversion.
                notes:
                    type: string
                    description: Exact-claim text and any limitations needed to audit the record.
                valueQualifier:
                    type: string
                    description: Source qualifier such as "more_than", "about", "reported", or "not_measured".
                sourceLocator:
                    type: string
                    description: Stable location within the source where the claim can be found.
                accessedAt:
                    type: string
                    description: Date the source was checked (YYYY-MM-DD); not a source observation time.
                denominator:
                    type: string
                    description: Time/value denominator used by the source claim.
                derivation:
                    type: string
                    description: Explicit derivation applied to the claim, or why no derivation is allowed.
            description: |-
                GivingProvenance records one auditable published claim or one explicit
                 collection/compatibility status. No field represents a source observation
                 time; source reference periods and verified publication dates stay separate
                 from response/cache timestamps.
