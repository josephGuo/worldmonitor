openapi: 3.1.0
info:
    title: GivingService API
    version: 1.0.0
security:
    - WorldMonitorKey: []
    - ApiKeyHeader: []
servers:
    - url: https://api.worldmonitor.app
paths:
    /api/giving/v1/get-giving-summary:
        get:
            tags:
                - GivingService
            summary: GetGivingSummary
            description: |-
                GetGivingSummary retrieves published-claim platform projections, a verified
                 tracked-platform annualized flow estimate, and claim-level provenance.
                 Compatibility index/trend fields are explicitly marked unavailable.
                 Empty/absent summary with fetched_at=0 or data_available=false means the
                 snapshot is unavailable/degraded, not that giving activity is zero.
            operationId: GetGivingSummary
            parameters:
                - name: platform_limit
                  in: query
                  description: |-
                    Number of platform rows to return (0 = all). Aggregates and provenance
                     continue to describe the full snapshot.
                  required: false
                  example: 25
                  schema:
                    type: integer
                    format: int32
                - name: category_limit
                  in: query
                  description: |-
                    Number of category rows to return (0 = all). Aggregates and provenance
                     continue to describe the full snapshot.
                  required: false
                  example: 25
                  schema:
                    type: integer
                    format: int32
                - name: jmespath
                  in: query
                  description: |-
                    Optional JMESPath expression applied server-side to project or reduce the JSON response before it is returned (mirrors the MCP jmespath argument). Invalid expressions, expressions larger than 1024 UTF-8 bytes, or projections that exceed the 256 KB output cap return HTTP 400 with a {_jmespath_error, original_keys} envelope. Grammar and worked examples: https://www.worldmonitor.app/docs/mcp-jmespath.
                  required: false
                  example: "keys(@)"
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            example:
                                "dataAvailable": true
                                "fetchedAt": 1784894400000
                                "summary":
